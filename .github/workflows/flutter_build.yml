name: Build Flutter App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: app

      - name: Analyze code
        run: flutter analyze
        working-directory: app

      - name: Build for Android (Linux)
        if: runner.os == 'Linux'
        run: flutter build apk --release
        working-directory: app

      - name: Build for iOS (macOS)
        if: runner.os == 'macOS'
        run: flutter build ios --release --no-codesign
        working-directory: app

      - name: Build for macOS (macOS)
        if: runner.os == 'macOS'
        run: flutter build macos --release
        working-directory: app

      - name: Build for Windows (Windows)
        if: runner.os == 'Windows'
        run: flutter build windows --release
        working-directory: app

      - name: Upload Android APK
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: wesend-android-apk
          path: app/build/app/outputs/flutter-apk/*.apk

      - name: Upload iOS build
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: wesend-ios-build
          path: app/build/ios/iphoneos/*.app

      - name: Upload macOS build
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: wesend-macos-build
          path: app/build/macos/Build/Products/Release/*.app

      - name: Upload Windows build
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: wesend-windows-build
          path: app/build/windows/runner/Release/
