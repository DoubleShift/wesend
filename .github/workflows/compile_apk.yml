name: Compile APK (ARM64 Only)

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FLUTTER_VERSION: "3.35.6"
  RUST_VERSION: "1.84.1"

jobs:
  build_apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Remove proprietary dependencies
        run: sh scripts/remove_proprietary_dependencies.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: ${{ env.RUST_VERSION }}

      - name: Dependencies
        working-directory: app
        run: flutter pub get

      - name: Build APK (ARM64 only)
        working-directory: app
        run: flutter build apk --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: wesend-arm64-apk
          path: app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
